[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --tb=short
    --screenshot=only-on-failure
    --video=retain-on-failure
    --tracing=retain-on-failure
    --output=reports/playwright
    --alluredir=reports/allure-results
markers =
    web: Web tests
    web_login: prueba de login Web UI
    booking: pruebas de reservas
    cash: pruebas de caja
    court: pruebas de canchas
    api: API tests
    qa: endpoints QA controlados
    e2e: pruebas end-to-end
    auth: login, logout y autenticacion
    reservas: gestion de reservas
    caja: gestion de caja y cobros
    clientes: gestion de clientes
    torneos: gestion de torneos
    organizer: Organizer LITE tests
    discovery: relevamiento diagnostico de DOM y locators
    diagnostics: UI diagnostics tests for locator/debug analysis
    debug: Debug-only tests excluded from normal health report
    suscripcion: suscripciones, planes y limites
    roles: roles y permisos
    multitenant: aislamiento entre tenants
    whatsapp: bot WhatsApp info-only
    responsive: validaciones responsive
    smoke: Smoke tests
    negative: negative and edge case tests
    crud: CRUD tests
    regression: suite de regresion
